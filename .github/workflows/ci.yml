name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Validate PIE package metadata
        run: composer validate --strict

  unix:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.php-version == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5', 'nightly']
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Prepare build
        run: |
          phpize
          ./configure

      - name: Build
        run: make -j"$(nproc)"

      - name: Test
        run: make test REPORT_EXIT_STATUS=1 NO_INTERACTION=1

  windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4', '8.5']
        arch: ['x64']
        ts: ['nts', 'ts']
    steps:
      - uses: actions/checkout@v5

      - name: Build extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          args: --enable-terminal
